<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items:center;
        }
        .container{
            border: 5px solid black;
            padding: 30px;
        }
        input{
            width: 400px;
            padding:10px 0px;
            border: 2px solid black;
        }
        
        #button-container{
            margin-top:30px;
            display: grid;
           grid-template-columns: auto auto auto auto;
           row-gap:10px;
           column-gap:10px;
        }

        #button-container div{
            border:2px solid red;
            text-align:center;
            padding:10px;
            border-radius:10px;
            
        }
        #button-container div:nth-child(16){
            grid-row-start: 4;
            grid-column-start: 4;
            grid-row-end: 6;
           
        }
        #button-container div:nth-child(1){
            grid-column-start:1;
            grid-column-end:  3;
            background-color:aliceblue;
        }
           
    </style>
</head>
<body>
    <div class="container">
        <div>

            <input type="number" readonly placeholder="0">
        </div>
        <div id="button-container">
            <div>sin</div>
            <div>tan</div>
            <div>cos</div>
            <div>AC</div>

           <div>9</div>
           <div>8</div>
           <div>7</div>
           <div>*</div>
           

           <div>4</div>
           <div>5</div>
           <div>6</div>
           <div>-</div>

           <div>1</div>
           <div>2</div>
           <div>3</div>
           <div>+</div>
           
          
         <div>=</div>
           <div>0</div>
           <div>/</div>
          
        </div>
    </div>
</body>
</html>
