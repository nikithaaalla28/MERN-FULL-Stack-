<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*adjacent sibling selector:useddirect adjacent element*/
        ol+h1{
            background-color:grey;
            color: burlywood;
        }
        /*child selector*/
    
        h3>p{
            background-color:antiquewhite;
            color:grey;
        }
        /*child selector used to direct child element*/
        ol>li{
            background-color:aquamarine;
            margin:20px;
        }
       /*decendent selector used to target direct or indirect child items*/
ul p{
    background-color:brown;
}
/*general sibiling selector is used to target direct snd indirect adjacent elements*/
ol~h1{
    background-color: brown;
}
    </style>
</head>
<body>
    <h1> orderd list</h1>
    <ol>
        <li>list-1</li>
        <li>list-2</li>
        <li>list-3</li>
        <li>list-4</li>
    </ol>
    <h1>unordered list</h1  
    <ul>
        <li><p>this is paragraph presemts in unorderd list</p></li>
        <li>unorderd list items</li>
        <li>unorderd list items</li>
        <li></h1>unorderd list items</li>
    </ul>

    <h1>heading in 3rd position</h1>
    <h3>
        <p>heading 4</p>
    </h3>

</body>
</html>
