<body>
    <form action="" method="">
        <fieldset style="background-image: linear-gradient(red,white,green); border-radius: 10px 50px; padding:30px;">
            <legend align="right
            ">login form</legend>
            <label for="username">username:</label> 
            <input type="text" name="username" required name="username"  id="username" minlength="2" placeholder="enter username"><br><br>
            <label for="psw">password:</label>
            <input type="password" required name="password" name="password" maxlength="4"  id="psw" placeholder="enter password"><br><br>
            <button type="submit">Login</button>
            <button type="reset">cancel</button>
        </fieldset>
    </form>  
</body>
